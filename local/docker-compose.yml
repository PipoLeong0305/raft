version: '3.9'
services:
  php-fpm:
    build:
      context: "./vendor/pipo/raft/services/php83"
      dockerfile: Dockerfile
      args:
        WWWGROUP: '${WWWGROUP}'
    volumes:
      - ./:/var/www/html:rw
    environment:
      WWWUSER: '${WWWUSER}'
    ports:
      - "5173:5173"
    networks:
      - raft
  
  apache-httpd:
    build:
      context: "./vendor/pipo/raft/services/apache"
      dockerfile: Dockerfile
      args:
        WWWGROUP: '${WWWGROUP}'
    volumes:
      - ./:/var/www/html:rw
      - ./docker/apache/ssl:/usr/local/apache2/ssl
    ports:
      - "80:80"
      - "443:443"
    environment:
      WWWUSER: '${WWWUSER}'
    depends_on:
      - php-fpm
    networks:
      - raft

networks:
  raft:
    driver: bridge